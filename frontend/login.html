<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styleAuth.css">
    <title>Login</title>
</head>
<body class="auth-screen">
    <div class="auth-banner">
        <h2>Welcome!</h2>
        <p>Is this your first time here? Sign-Up right now and enjoy the full experience!</p>
    </div>
    <div class="auth-form">
    <div class="items"> 
    <h1>Login:</h1>
    <form id="Login">
        <input type="text" placeholder="Username" name="username" id="entry" required>
        <input type="password" id="password" placeholder="Password" name="password" required>
        <label class="container-checkbox">Remember Me
            <input type="checkbox">
            <span class="checkmark"></span>
          </label>
          <div class="navigation-links">
            <a href="register.html">Don't have an account? Register!</a>
            <a href="frontPage.html">Back to Home</a>
            <a href="accountRecovery.html">Forgot Password?</a>
        </div>
        <input type="submit" value="Login" id="button">

    </form>

    <script>
    document.getElementById('Login').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        data.action = 'Login';

        try {
            const response = await fetch('../backend/api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const text = await response.text();
            try {
                const result = JSON.parse(text);
                if (result.success) {
                    window.location.href = 'frontPage.html';
                } else {
                    alert('Login failed: ' + result.message);
                }
            } catch (e) {
                console.error('Server response was not JSON:', text);
                alert('Server Error: ' + text);
            }
        } catch (error) {
            console.error('Network Error:', error);
            alert('An error occurred during login. Please try again.');
        }
    });
    </script>

</div>
</body>
</html>

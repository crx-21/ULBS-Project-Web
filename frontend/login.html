<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>
    <form action="../backend/api.php" method="post" class="auth-form">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <input type="submit" value="Login">
    </form>
    <form action="register.html" method="get" class="auth-form">
        <input type="submit" value="Don't have an account? Register">
    </form>
    <form action="frontPage.html" method="get" class="auth-form">
        <input type="submit" value="Back to Home">
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <h1>Sign Up</h1>
    <form action="../backend/api.php" method="post" class="auth-form">
        <label>Username:</label>
        <input type="text"     name="username">
        <label>Email:</label>
        <input type="email"    name="email">
        <label>Password:</label>
        <input type="password" name="password">
        <input type="hidden"   name="role" value="tenant">  <!-- or a <select> -->
        <input type="submit"   name="action" value="Register">
        <!--Am pus nav links ca e mai ok sebi ca sa stii.-->
        <div class="navigation-links">
            <br>
            <a href="login.html">Already have an account? Sign In</a>
            <br><br>
            <a href="frontPage.html">Back to Home</a>
        </div>
    </form>
</body>
</html>

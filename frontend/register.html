<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styleAuth.css">
    <title>Register</title>
</head>

<body class="auth-screen">

    <div class="auth-banner">
        <h2>Welcome!</h2>
        <p>Is this your first time here? Sign-Up right now and enjoy the full experience!</p>
    </div>

    <div class="auth-form">
        <div class="items">
            <form id="Register">
                <h1>Sign Up:</h1>

                <input type="email" placeholder="Email" id="entry" name="email" required>
                <input type="text" placeholder="Username" id="entry" name="username" required>
                <input type="password" placeholder="Password" id="password" name="password" required>
                <input type="hidden" name="role" value="tenant">
                <div class="navigation-links">
                    <a href="login.html">Already have an account? Sign In</a>
                </div>
                <input type="submit" name="action" value="Register" id="button">    
            </form>  
        </div>
    </div>
    <script src="auth.js"></script>
</body>

</html>

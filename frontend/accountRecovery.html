<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styleRecovery.css">
    <title>Rental Platform</title>
</head>
<body>

    <div class="container">
        <h2>Account Recovery</h2>
    
        <div id="step1">
            <p>Enter your email to receive a recovery code.</p>
            <input type="email" id="email" placeholder="you@example.com" required>
            <button onclick="requestCode()">Send Code</button>
        </div>
    
        <div id="step2" class="hidden">
            <p>Enter the 6-digit code sent to your email.</p>
            <input type="text" id="code" placeholder="123456" required>
            <input type="password" id="newPassword" placeholder="New Password" required>
            <button onclick="resetPassword()">Reset Password</button>
        </div>
    
        <p id="message"></p>
    </div>

<script src="accountRecovery.js"></script>
</body>
</html>
